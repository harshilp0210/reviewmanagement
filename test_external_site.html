<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External Hotel Website</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            background: #f0f0f0;
        }

        header {
            background: #333;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h1 {
            margin-top: 0;
        }

        .hero {
            height: 300px;
            background: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            margin-bottom: 40px;
        }
    </style>
</head>

<body>

    <header>
        <h2>The Grand Budapest Hotel</h2>
    </header>

    <main>
        <div class="hero"></div>
        <h1>Welcome to Luxury</h1>
        <p>Experience the finest hospitality in the heart of the city.</p>

        <hr style="margin: 40px 0; border: none; border-top: 1px solid #ddd;">

        <h3>What our guests say:</h3>

        <!-- EMBED CODE START -->
        <div id="reviewmanager-widget" data-theme="light" data-limit="3"></div>
        <script src="http://localhost:5173/embed.js" async></script>
        <!-- EMBED CODE END -->

        <p style="margin-top: 40px; color: #666; font-size: 0.9em;">(This widget is powered by ReviewManager)</p>

</html>
